[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    --tb=short
    --strict-markers
    -q

# Timeout (requires pytest-timeout)
timeout = 30

# Asyncio mode — auto so async tests don't need @pytest.mark.asyncio
asyncio_mode = auto

# Markers — asyncio must be listed here so --strict-markers accepts it
markers =
    unit: pure unit tests — no backend or DB required
    integration: requires running backend and infrastructure
    slow: tests that take more than 5 seconds
    websocket: tests requiring live WebSocket connection
    asyncio: mark a test as an async coroutine (managed by pytest-asyncio)

# Suppress deprecation noise from Python 3.14 + pytest-asyncio 0.23
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
    ignore::DeprecationWarning:asyncio.*

# Coverage defaults (override with --cov on CLI)
# Run: pytest --cov=. --cov-report=term-missing --cov-fail-under=70

[pytest-asyncio]
asyncio_mode = auto
