version: "3.9"

# ═══════════════════════════════════════════════════════════════
# SENTINELTWIN — Docker Compose Production Stack
# Services: FastAPI | PostgreSQL+TimescaleDB | Redis | Kafka |
#           Zookeeper | Prometheus | Grafana | Nginx
# ═══════════════════════════════════════════════════════════════

x-common-env: &common-env
  TZ: UTC
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"

networks:
  sentinel-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  sentinel-external:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  sentineltwin_logs:
    driver: local
  sentineltwin_reports:
    driver: local

services:

  # ─────────────────────────────────────────────────────────────
  # POSTGRESQL + TIMESCALEDB
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sentineltwin-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: sentineltwin
      POSTGRES_PASSWORD: sentinel_secure_pw
      POSTGRES_DB: sentineltwin
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - sentinel-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentineltwin -d sentineltwin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ─────────────────────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sentineltwin-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --requirepass sentinel_redis_pw
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sentinel-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "sentinel_redis_pw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # ZOOKEEPER (Kafka dependency)
  # ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sentineltwin-zookeeper
    restart: unless-stopped
    environment:
      <<: *common-env
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - sentinel-internal
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentineltwin-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      <<: *common-env
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - sentinel-internal
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # SENTINELTWIN BACKEND (FastAPI)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sentineltwin-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://sentineltwin:sentinel_secure_pw@postgres:5432/sentineltwin
      REDIS_URL: redis://:sentinel_redis_pw@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEBUG: "false"
      WORKERS: "4"
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: INFO
      SENSOR_COUNT: "8192"
      SENSOR_WORKER_COUNT: "16"
    volumes:
      - sentineltwin_logs:/app/logs
      - sentineltwin_reports:/app/reports
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    networks:
      - sentinel-internal
      - sentinel-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  # ─────────────────────────────────────────────────────────────
  # SENTINELTWIN FRONTEND (React + Vite)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentineltwin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
      VITE_WS_URL: ws://backend:8000/ws
    ports:
      - "3000:3000"
    networks:
      - sentinel-internal
      - sentinel-external
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sentineltwin-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sentinel-external
      - sentinel-internal
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # PROMETHEUS
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentineltwin-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - sentinel-internal
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentineltwin-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel_grafana_pw
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - sentinel-internal
    logging: *default-logging
